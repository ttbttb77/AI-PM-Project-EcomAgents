<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EcomAgents — 新品上架向导</title>
<style>
  :root{--bg-root:#0a0f1a;--bg-surface:#111827;--bg-card:#1a2332;--bg-hover:#1e2d3d;--border:#1e3a5f;--text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;--accent:#3b82f6;--accent-glow:rgba(59,130,246,.25);--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--radius:12px;--radius-sm:8px;--transition:200ms cubic-bezier(.4,0,.2,1)}
  *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-root);color:var(--text-primary);display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  .sidebar{width:220px;min-width:220px;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;z-index:10}
  .side-logo{display:flex;align-items:center;gap:10px;padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
  .side-logo .mark{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#6366f1);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
  .side-logo span{font-family:Georgia,serif;font-size:18px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:2px 12px;border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;transition:var(--transition);font-size:14px;text-decoration:none}
  .nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-glow)}
  .spacer{flex:1}.side-user{margin:0 12px;padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .side-user .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{height:48px;min-height:48px;background:var(--bg-surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
  .topbar .t{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
  .step-ind{display:flex;gap:4px;align-items:center}
  .step-d{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--border);color:var(--text-muted);transition:var(--transition)}
  .step-d.done{background:var(--green);color:#fff}.step-d.active{background:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-glow)}
  .step-l{width:28px;height:2px;background:var(--border)}.step-l.done{background:var(--green)}
  .content{flex:1;overflow-y:auto;padding:28px 48px;display:flex;justify-content:center}
  .content::-webkit-scrollbar{width:6px}.content::-webkit-scrollbar-thumb{background:var(--border)}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:680px}
  .card h2{font-size:19px;margin-bottom:4px}.card .sub{color:var(--text-muted);font-size:12px;margin-bottom:22px}

  .form-group{margin-bottom:18px}.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 13px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;font-family:inherit;outline:none;transition:var(--transition)}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
  .form-group textarea{resize:vertical;min-height:72px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  .chip-group{display:flex;gap:6px;flex-wrap:wrap}.chip{padding:7px 14px;border-radius:18px;background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);font-size:12px;cursor:pointer;transition:var(--transition)}
  .chip:hover{border-color:var(--accent);color:var(--accent)}.chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}

  .platform-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .plat-card{padding:14px;background:var(--bg-surface);border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);text-align:center}
  .plat-card:hover{border-color:var(--accent)}.plat-card.selected{border-color:var(--accent);background:rgba(59,130,246,.08)}
  .plat-card .pn{font-weight:700;font-size:14px}.plat-card .ps{font-size:10px;color:var(--text-muted);margin-top:3px}

  .summary{background:var(--bg-surface);border-radius:var(--radius-sm);padding:18px;margin-top:14px}
  .summary .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
  .summary .row:last-child{border-bottom:none}.summary .lb{color:var(--text-muted)}.summary .vl{font-weight:600}

  .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
  .btn{display:inline-flex;align-items:center;gap:4px;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);border:1px solid var(--border);background:var(--bg-surface);color:var(--text-secondary)}
  .btn:hover{border-color:var(--accent);color:var(--accent)}.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}.btn.pri:hover{box-shadow:0 0 18px var(--accent-glow);transform:translateY(-1px)}
  .slide-in{animation:si .3s ease-out}@keyframes si{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="side-logo"><div class="mark">EA</div><span>EcomAgents</span></div>
  <a href="dashboard.html" class="nav-item">🏠 主控台</a>
  <a href="chat.html" class="nav-item">💬 对话</a>
  <a href="workflow-detail.html" class="nav-item">⚡ 工作流</a>
  <a href="new-product-wizard.html" class="nav-item active">📦 新品上架</a>
  <a href="agent-management.html" class="nav-item">🤖 Agent管理</a>
  <a href="data-dashboard.html" class="nav-item">📊 数据中心</a>
  <a href="promotion.html" class="nav-item">🎪 促销活动</a>
  <a href="service-workbench.html" class="nav-item">💬 客服工作台</a>
  <a href="finance-report.html" class="nav-item">💰 财务报表</a>
  <a href="settings.html" class="nav-item">⚙️ 设置</a>
  <div class="spacer"></div>
  <div class="side-user"><div class="av">A</div><div><div style="font-size:13px;font-weight:600">商家 A</div><div style="color:var(--green);font-size:11px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px"></span>在线</div></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="t">📦 新品上架向导</div>
    <div class="step-ind" id="stepInd">
      <div class="step-d active" id="sd1">1</div><div class="step-l" id="sl1"></div>
      <div class="step-d" id="sd2">2</div><div class="step-l" id="sl2"></div>
      <div class="step-d" id="sd3">3</div><div class="step-l" id="sl3"></div>
      <div class="step-d" id="sd4">4</div>
    </div>
  </div>
  <div class="content" id="wiz"></div>
</div>

<script>
  const S={step:1,product:{name:'304不锈钢保温杯',category:'',material:'',sellingPoints:[],targetAudience:'',style:'简约',priceMin:79,priceMax:99,stock:500,platforms:['taobao']}};
  const cats=['女装/男装','鞋靴/箱包','美妆/个护','家居/家纺','数码/家电','食品/生鲜','母婴/玩具','运动/户外'];
  const st=['简约','商务','可爱','科技','奢华','复古','自然','运动'];
  const au=['商务白领','学生群体','宝妈','户外爱好者','数码极客','时尚女性','银发一族'];
  const plats=[{id:'taobao',name:'淘宝',spec:'标题≤30字 | 主图800×800 | 5张'},{id:'jd',name:'京东',spec:'标题≤50字 | 主图800×800 | 6-10张'},{id:'douyin',name:'抖音电商',spec:'标题≤28字 | 1:1或3:4 | 场景图优先'},{id:'pdd',name:'拼多多',spec:'标题≤30字 | 主图500×500+ | 最多10张'}];

  function updStep(){for(let i=1;i<=4;i++){const d=document.getElementById('sd'+i),l=document.getElementById('sl'+i);d.className='step-d';if(i<S.step)d.classList.add('done');if(i===S.step)d.classList.add('active');if(l){l.className='step-l';if(i<S.step)l.classList.add('done')}}}

  function r(){updStep();const c=document.getElementById('wiz');c.innerHTML='';if(S.step===1)r1(c);else if(S.step===2)r2(c);else if(S.step===3)r3(c);else if(S.step===4)r4(c)}

  function r1(c){const d=document.createElement('div');d.className='card slide-in';d.innerHTML=`<h2>📦 商品基本信息</h2><div class="sub">告诉店长您要上架的商品，这些信息将分发给美工、文案、运营 Agent</div>
    <div class="form-group"><label>商品名称</label><input type="text" id="fn" value="${S.product.name}"></div>
    <div class="form-row"><div class="form-group"><label>商品类目</label><select id="fc">${cats.map(x=>`<option ${S.product.category===x?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="form-group"><label>材质/规格</label><input type="text" id="fm" value="${S.product.material}" placeholder="如：304不锈钢、双层真空"></div></div>
    <div class="form-group"><label>核心卖点（点击选择，可多选）</label><div class="chip-group" id="spc">${['高品质材质','持久保温','便携设计','防漏密封','大容量','高颜值','环保健康','送礼佳品','性价比高','品牌正品'].map(sp=>`<div class="chip${S.product.sellingPoints.includes(sp)?' selected':''}" data-v="${sp}">${sp}</div>`).join('')}</div><input type="text" id="fcsp" placeholder="输入自定义卖点，回车添加..." style="margin-top:6px" onkeydown="if(event.key==='Enter'){addSP();event.preventDefault()}"></div>
    <div class="form-group"><label>目标人群</label><div class="chip-group" id="ac">${au.map(a=>`<div class="chip${S.product.targetAudience===a?' selected':''}" data-v="${a}">${a}</div>`).join('')}</div></div>
    <div class="btn-row"><button class="btn pri" onclick="go2()">下一步：视觉风格 →</button></div>`;c.appendChild(d);
    d.querySelectorAll('#spc .chip').forEach(ch=>{ch.addEventListener('click',()=>{ch.classList.toggle('selected');const v=ch.dataset.v;if(ch.classList.contains('selected'))S.product.sellingPoints.push(v);else S.product.sellingPoints=S.product.sellingPoints.filter(s=>s!==v)})});
    d.querySelectorAll('#ac .chip').forEach(ch=>{ch.addEventListener('click',()=>{d.querySelectorAll('#ac .chip').forEach(x=>x.classList.remove('selected'));ch.classList.add('selected');S.product.targetAudience=ch.dataset.v})})}

  function addSP(){const i=document.getElementById('fcsp'),v=i.value.trim();if(!v)return;S.product.sellingPoints.push(v);const g=document.getElementById('spc'),ch=document.createElement('div');ch.className='chip selected';ch.textContent=v;ch.dataset.v=v;ch.addEventListener('click',()=>{ch.classList.toggle('selected');S.product.sellingPoints=S.product.sellingPoints.filter(s=>s!==v);if(!ch.classList.contains('selected'))ch.remove()});g.appendChild(ch);i.value=''}

  function go2(){S.product.name=document.getElementById('fn').value||S.product.name;S.product.category=document.getElementById('fc').value||'家居/家纺';S.product.material=document.getElementById('fm').value;S.step=2;r()}

  function r2(c){const d=document.createElement('div');d.className='card slide-in';d.innerHTML=`<h2>🎨 视觉风格与定价</h2><div class="sub">影响美工出图方向和运营的定价策略</div>
    <div class="form-group"><label>视觉风格（美工 Agent 按此风格出图）</label><div class="chip-group" id="sc">${st.map(s=>`<div class="chip${S.product.style===s?' selected':''}" data-v="${s}">${s}</div>`).join('')}</div></div>
    <div class="form-row"><div class="form-group"><label>最低价格 (¥)</label><input type="number" id="fpmin" value="${S.product.priceMin}" min="1"></div><div class="form-group"><label>最高价格 (¥)</label><input type="number" id="fpmax" value="${S.product.priceMax}" min="1"></div></div>
    <div class="form-group"><label>初始库存（件）</label><input type="number" id="fst" value="${S.product.stock}" min="1"></div>
    <div class="btn-row"><button class="btn" onclick="S.step=1;r()">← 上一步</button><button class="btn pri" onclick="go3()">下一步：选择平台 →</button></div>`;c.appendChild(d);
    d.querySelectorAll('#sc .chip').forEach(ch=>{ch.addEventListener('click',()=>{d.querySelectorAll('#sc .chip').forEach(x=>x.classList.remove('selected'));ch.classList.add('selected');S.product.style=ch.dataset.v})})}

  function go3(){S.product.priceMin=parseInt(document.getElementById('fpmin').value)||79;S.product.priceMax=parseInt(document.getElementById('fpmax').value)||99;S.product.stock=parseInt(document.getElementById('fst').value)||500;S.step=3;r()}

  function r3(c){const d=document.createElement('div');d.className='card slide-in';d.innerHTML=`<h2>🏪 选择上架平台</h2><div class="sub">选择商品要上架的电商平台（可多选）</div>
    <div class="platform-cards" id="pcs">${plats.map(p=>`<div class="plat-card${S.product.platforms.includes(p.id)?' selected':''}" data-id="${p.id}"><div style="font-size:28px;margin-bottom:6px">${p.id==='taobao'?'🟠':p.id==='jd'?'🔴':p.id==='douyin'?'⚫':'🔴'}</div><div class="pn">${p.name}</div><div class="ps">${p.spec}</div></div>`).join('')}</div>
    <div class="btn-row"><button class="btn" onclick="S.step=2;r()">← 上一步</button><button class="btn pri" onclick="go4()">下一步：确认提交 →</button></div>`;c.appendChild(d);
    d.querySelectorAll('.plat-card').forEach(card=>{card.addEventListener('click',()=>{card.classList.toggle('selected');const id=card.dataset.id;if(card.classList.contains('selected'))S.product.platforms.push(id);else S.product.platforms=S.product.platforms.filter(p=>p!==id)})})}

  function go4(){if(S.product.platforms.length===0){alert('请至少选择一个平台');return}S.step=4;r()}

  function r4(c){const d=document.createElement('div');d.className='card slide-in';const p=S.product,pln=p.platforms.map(id=>plats.find(x=>x.id===id)?.name||id).join(' / '),ep=Math.round((p.priceMin+p.priceMax)/2),pm=Math.round(35+Math.random()*15);
    d.innerHTML=`<h2>✅ 确认商品信息</h2><div class="sub">店长将审核以下信息，确认无误后启动工作流</div>
    <div class="summary"><div class="row"><span class="lb">商品名称</span><span class="vl">${p.name}</span></div><div class="row"><span class="lb">类目</span><span class="vl">${p.category||'—'}</span></div><div class="row"><span class="lb">材质</span><span class="vl">${p.material||'—'}</span></div><div class="row"><span class="lb">卖点</span><span class="vl">${p.sellingPoints.join(' / ')||'—'}</span></div><div class="row"><span class="lb">人群</span><span class="vl">${p.targetAudience||'—'}</span></div><div class="row"><span class="lb">风格</span><span class="vl">${p.style}</span></div><div class="row"><span class="lb">价格</span><span class="vl">¥${p.priceMin} - ¥${p.priceMax}</span></div><div class="row"><span class="lb">库存</span><span class="vl">${p.stock} 件</span></div><div class="row"><span class="lb">平台</span><span class="vl">${pln}</span></div><div class="row"><span class="lb">预估定价</span><span class="vl" style="color:var(--accent)">¥${ep}（利润率约 ${pm}%）</span></div></div>
    <div style="margin-top:16px;padding:14px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.2);border-radius:8px;font-size:12px;color:var(--green)">⚡ 确认后，店长将协调 🎨美工、✍️文案、📊运营、📦仓储 并行工作，<b>预计 25 分钟</b> 完成上架（传统方式需 2 天）。</div>
    <div class="btn-row"><button class="btn" onclick="S.step=3;r()">← 上一步</button><button class="btn pri" onclick="go()" id="goBtn">🚀 启动工作流</button></div>`;c.appendChild(d)}

  async function go(){const btn=document.getElementById('goBtn');btn.disabled=true;btn.textContent='⏳ 启动中...';const sts=[{m:'👔 店长分析需求，分解任务...',d:700},{m:'📋 生成商品信息卡，分配至 5 个 Agent...',d:500},{m:'🎨 美工开始生成商品图...',d:400},{m:'✍️ 文案开始撰写标题和详情页...',d:400},{m:'📊 运营开始分析竞品定价...',d:400}];const card=document.querySelector('.card');const sd=document.createElement('div');sd.style.cssText='margin-top:20px;padding:16px;background:var(--bg-surface);border-radius:8px';sd.innerHTML='<div style="font-weight:700;margin-bottom:10px">⚡ 工作流执行中...</div>';card.appendChild(sd);for(const s of sts){await new Promise(r=>setTimeout(r,s.d));const l=document.createElement('div');l.style.cssText='font-size:12px;color:var(--text-secondary);padding:3px 0';l.textContent=s.m;sd.appendChild(l)}
    const pb=document.createElement('div');pb.style.cssText='margin-top:12px;height:3px;background:var(--border);border-radius:2px;overflow:hidden';const pf=document.createElement('div');pf.style.cssText='height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width 8s ease-out';pb.appendChild(pf);sd.appendChild(pb);setTimeout(()=>{pf.style.width='100%'},100);
    await new Promise(r=>setTimeout(r,2000));
    // 将商品信息存入 sessionStorage 传给工作流详情页
    try{sessionStorage.setItem('wf_product',JSON.stringify(S.product));}catch(e){}
    window.location.href='workflow-detail.html';}

  r();
</script>
</body>
</html>
