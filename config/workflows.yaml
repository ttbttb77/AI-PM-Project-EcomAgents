# Ecommerce multi-agent workflow configuration.
#
# Current behavior:
# - orchestrator.js loads this file when valid `steps` are provided.
# - Built-in workflows remain as a fallback to keep the demo stable.
# - Agent output is still simulated in demo mode.

new_product:
  name: "新品上架"
  totalEstimate: "25 分钟"
  traditionalTime: "约 2 天"
  steps:
    - id: "info_collect"
      name: "信息收集"
      agent: "manager"
      duration: 2000
      desc: "引导商家补充商品名称、类目、卖点、价格带和目标人群"
    - id: "task_decompose"
      name: "任务拆解"
      agent: "manager"
      duration: 1500
      desc: "识别依赖关系，并分配给美工、文案、运营、仓储 Agent"
    - id: "parallel_work"
      name: "并行处理"
      agent: "parallel"
      duration: 8000
      desc: "美工、文案、运营并行生成上架所需素材和策略"
      parallel:
        - agent: "designer"
          task: "生成商品主图、细节图、场景图和包装图"
          output: "商品图 5 张，覆盖主图、细节、场景、对比和包装视角"
        - agent: "copywriter"
          task: "撰写标题、卖点和详情页文案"
          output: "标题 5 条，详情页文案 1200 字，SEO 关键词 7 个"
        - agent: "operator"
          task: "分析竞品价格并给出定价建议"
          output: "建议定价 89 元，参考竞品均价 102 元，并给出首发促销建议"
    - id: "inventory_set"
      name: "库存设置"
      agent: "warehouse"
      duration: 1200
      desc: "创建 SKU，设置初始库存和安全库存阈值"
    - id: "quality_check"
      name: "质量审核"
      agent: "manager"
      duration: 1800
      desc: "审核各 Agent 输出，检查是否满足上架条件"
    - id: "publish"
      name: "一键上架"
      agent: "operator"
      duration: 3000
      desc: "模拟调用平台工具完成商品上架"
    - id: "report"
      name: "结果汇报"
      agent: "manager"
      duration: 1000
      desc: "汇总产出物和待人工确认项"

promotion:
  name: "促销活动策划"
  totalEstimate: "约 1 天"
  traditionalTime: "约 1 周"
  steps:
    - id: "need_confirm"
      name: "需求确认"
      agent: "manager"
      duration: 2000
      desc: "确认活动目标、预算、时间范围和参与商品"
    - id: "data_analysis"
      name: "数据分析"
      agent: "operator"
      duration: 4000
      desc: "分析历史销售、客单价、转化率和竞品活动策略"
    - id: "plan_make"
      name: "方案制定"
      agent: "operator"
      duration: 3000
      desc: "制定满减、折扣、赠品和投放策略"
    - id: "plan_review"
      name: "方案审核"
      agent: "manager"
      duration: 2000
      desc: "审核 ROI、风险点和人工确认项"
    - id: "material_prep"
      name: "素材准备"
      agent: "parallel"
      duration: 5000
      desc: "美工和文案并行准备活动素材"
      parallel:
        - agent: "designer"
          task: "设计活动海报、Banner 和商品图角标"
          output: "活动海报、Banner、角标规范各 1 套"
        - agent: "copywriter"
          task: "撰写活动文案和推广话术"
          output: "活动标题、短信模板、直播话术和站内推广文案"
    - id: "launch"
      name: "活动上线"
      agent: "operator"
      duration: 3000
      desc: "模拟配置活动规则并上线"
    - id: "tracking"
      name: "效果追踪"
      agent: "operator"
      duration: 1000
      desc: "生成活动监控看板和异常提醒"

daily_ops:
  name: "日常运营"
  totalEstimate: "自动化巡检"
  traditionalTime: "约 4 小时/天"
  steps:
    - id: "cs_service"
      name: "客服自动回复"
      agent: "service"
      duration: 1500
      desc: "处理待回复咨询并识别需人工升级的问题"
    - id: "finance_log"
      name: "财务记账"
      agent: "finance"
      duration: 1500
      desc: "汇总订单收支，更新利润数据"
    - id: "inventory_chk"
      name: "库存巡检"
      agent: "warehouse"
      duration: 2000
      desc: "检查 SKU 库存水位并提示补货风险"
    - id: "data_analysis"
      name: "数据分析"
      agent: "operator"
      duration: 3000
      desc: "汇总销售数据，识别异常波动"
    - id: "daily_report"
      name: "日报生成"
      agent: "manager"
      duration: 2000
      desc: "生成经营日报和待处理事项"
